name: Weekly macro update

on:
  schedule:
    # KST 금요일 06:30 = UTC 목요일 21:30
    # Fed H.4.1 발표(목 16:30 ET) + Initial Jobless Claims(목 08:30 ET) 둘 다 반영 후
    - cron: '30 21 * * 4'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: macro-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies (weekly — API only)
        run: pip install requests python-dotenv

      - name: Fetch weekly data
        env:
          EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python -X utf8 fetch_data.py --weekly

      - name: Commit and push if data.json changed
        run: |
          if git diff --quiet data.json; then
            echo "::notice::data.json unchanged — skip commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "data(weekly): $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"
          for i in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "::warning::push attempt $i failed — rebase + retry"
            git pull --rebase origin main || git rebase --abort || true
            sleep $((i * 2))
          done
          echo "::error::push failed after 5 attempts"
          exit 1
