name: Weekly macro update

on:
  schedule:
    # KST 금요일 06:30 = UTC 목요일 21:30
    # Fed H.4.1 발표(목 16:30 ET) + Initial Jobless Claims(목 08:30 ET) 둘 다 반영 후
    - cron: '30 21 * * 4'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: macro-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies (weekly — API only)
        run: pip install requests python-dotenv

      - name: Fetch + commit + push (race-safe)
        env:
          EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for i in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main

            python -X utf8 fetch_data.py --weekly

            if git diff --quiet data.json history.json 2>/dev/null; then
              echo "::notice::data.json/history.json unchanged — skip commit"
              exit 0
            fi
            git add data.json history.json
            git commit -m "data(weekly): $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"

            if git push; then exit 0; fi
            echo "::warning::push attempt $i failed — re-fetch on latest main"
            sleep $((i * 3))
          done
          echo "::error::push failed after 3 attempts"
          exit 1

      - name: Notify on failure (open or update GitHub issue)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const mode = 'weekly';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `🚨 ${mode} workflow 실패 (자동 감지)`;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'auto-failed,' + mode
            });
            if (issues.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `🔁 다시 실패: ${runUrl}`
              });
            } else {
              const body = `워크플로 \`${mode}\` 실행 실패.\n\n` +
                           `- 시각: ${new Date().toISOString()}\n` +
                           `- 링크: ${runUrl}\n\n` +
                           `자동 cron이 다음 트리거에서 자동 복구될 수도 있음.\n` +
                           `해결 후 이 issue를 닫으면 다음 실패 시 새 issue로 다시 알림.`;
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['auto-failed', mode]
              });
            }
