name: Monthly macro update

on:
  schedule:
    # KST 매달 2일 09:00 = UTC 매달 2일 00:00
    # ISM PMI(매달 1일 10:00 ET) + NFP/실업률(첫째주 금) + JOLTS — 첫 영업일 발표 다음날
    - cron: '0 0 2 * *'
    # KST 매달 21일 11:00 = UTC 매달 21일 02:00
    # 중국 LPR (매달 20일 09:15 CST 발표) 갱신용
    - cron: '0 2 21 * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: macro-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Camoufox 다운로드 + Cloudflare 우회 + 최대 3회 재시도 여유

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies (monthly — Scrapling 포함)
        run: pip install -r requirements.txt

      - name: Cache Camoufox browser
        id: camoufox-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/camoufox
          key: camoufox-${{ runner.os }}-v1

      - name: Install Camoufox browser (first run only)
        if: steps.camoufox-cache.outputs.cache-hit != 'true'
        run: scrapling install

      - name: Fetch + commit + push (race-safe)
        env:
          EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for i in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main

            python -X utf8 fetch_data.py --monthly

            if git diff --quiet data.json history.json 2>/dev/null; then
              echo "::notice::data.json/history.json unchanged — skip commit"
              exit 0
            fi
            git add data.json history.json
            git commit -m "data(monthly): $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"

            if git push; then exit 0; fi
            echo "::warning::push attempt $i failed — re-fetch on latest main"
            sleep $((i * 3))
          done
          echo "::error::push failed after 3 attempts"
          exit 1

      - name: Notify on failure (open or update GitHub issue)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const mode = 'monthly';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `🚨 ${mode} workflow 실패 (자동 감지)`;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'auto-failed,' + mode
            });
            if (issues.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `🔁 다시 실패: ${runUrl}`
              });
            } else {
              const body = `워크플로 \`${mode}\` 실행 실패.\n\n` +
                           `- 시각: ${new Date().toISOString()}\n` +
                           `- 링크: ${runUrl}\n\n` +
                           `자동 cron이 다음 트리거에서 자동 복구될 수도 있음.\n` +
                           `해결 후 이 issue를 닫으면 다음 실패 시 새 issue로 다시 알림.`;
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['auto-failed', mode]
              });
            }
