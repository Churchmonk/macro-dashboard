name: Monthly macro update

on:
  schedule:
    # KST 매달 2일 09:00 = UTC 매달 2일 00:00
    # ISM PMI(매달 1일 10:00 ET) + NFP/실업률(첫째주 금) + JOLTS — 첫 영업일 발표 다음날
    - cron: '0 0 2 * *'
    # KST 매달 21일 11:00 = UTC 매달 21일 02:00
    # 중국 LPR (매달 20일 09:15 CST 발표) 갱신용
    - cron: '0 2 21 * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: macro-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20  # Camoufox 첫 다운로드 + Cloudflare 우회 시간 여유

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies (monthly — Scrapling 포함)
        run: pip install -r requirements.txt

      - name: Cache Camoufox browser
        id: camoufox-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/camoufox
          key: camoufox-${{ runner.os }}-v1

      - name: Install Camoufox browser (first run only)
        if: steps.camoufox-cache.outputs.cache-hit != 'true'
        run: scrapling install

      - name: Fetch monthly data
        env:
          EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python -X utf8 fetch_data.py --monthly

      - name: Commit and push if data.json changed
        run: |
          if git diff --quiet data.json; then
            echo "::notice::data.json unchanged — skip commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "data(monthly): $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"
          for i in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "::warning::push attempt $i failed — rebase + retry"
            git pull --rebase origin main || git rebase --abort || true
            sleep $((i * 2))
          done
          echo "::error::push failed after 5 attempts"
          exit 1
