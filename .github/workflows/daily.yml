name: Daily macro update

on:
  schedule:
    # KST 08:10 = UTC 23:10 (전날) — 미국장 마감 후 데이터 반영
    - cron: '10 23 * * *'
  workflow_dispatch:  # 수동 트리거 (Actions 탭에서 Run workflow)

permissions:
  contents: write

concurrency:
  group: macro-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies (daily — API only)
        run: pip install requests python-dotenv

      - name: Fetch daily data
        env:
          EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python -X utf8 fetch_data.py --daily

      - name: Commit and push if data.json changed
        run: |
          if git diff --quiet data.json; then
            echo "::notice::data.json unchanged — skip commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "data(daily): $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"
          # Race-safe push: 다른 cron이 main을 먼저 갱신했을 때 rebase 후 재시도
          for i in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "::warning::push attempt $i failed — rebase + retry"
            git pull --rebase origin main || git rebase --abort || true
            sleep $((i * 2))
          done
          echo "::error::push failed after 5 attempts"
          exit 1
