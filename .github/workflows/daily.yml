name: Daily macro update

on:
  schedule:
    # KST 08:10 = UTC 23:10 (전날) — 미국장 마감 후 데이터 반영
    - cron: '10 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: macro-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies (daily — API only)
        run: pip install requests python-dotenv

      - name: Fetch + commit + push (race-safe)
        env:
          EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for i in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main

            python -X utf8 fetch_data.py --daily

            if git diff --quiet data.json history.json 2>/dev/null; then
              echo "::notice::data.json/history.json unchanged — skip commit"
              exit 0
            fi
            git add data.json history.json
            git commit -m "data(daily): $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"

            if git push; then exit 0; fi
            echo "::warning::push attempt $i failed — re-fetch on latest main"
            sleep $((i * 3))
          done
          echo "::error::push failed after 3 attempts"
          exit 1
